// ======================== SPRITE RENDERER ========================
function drawSprite(ctx, sprite, palette, x, y, size, colorOverride) {
  const cellSize = size / 16;
  for (let row = 0; row < 16; row++) {
    for (let col = 0; col < 16; col++) {
      const idx = sprite[row][col];
      if (idx === 0) continue;
      let color = palette[idx];
      if (colorOverride && idx >= 6 && idx <= 14) color = colorOverride;
      ctx.fillStyle = color;
      ctx.fillRect(x + col * cellSize, y + row * cellSize, Math.ceil(cellSize), Math.ceil(cellSize));
    }
  }
}

// ======================== ENTITY CREATION ========================
function createPlayer(charId) {
  const base = {
    x: CONFIG.ARENA_W / 2, y: CONFIG.ARENA_H / 2,
    radius: CONFIG.PLAYER_RADIUS,
    hp: 10, maxHp: 10,
    armor: 0,
    speed: 180,
    spdMult: 1.0,
    dmgMult: 1.0,
    aspdMult: 1.0,
    rngMult: 1.0,
    lifesteal: 0,
    weapons: [{ id: 'stick', cd: 0, tier: 0 }],
    invincible: 0,
    angle: 0,
    color: null,
    passives: {
      explodeOnKill: false,
      magnetRange: 200,
      thorns: 0,
      bulletSplit: 0,
      extraProjectiles: 0,
      dodge: 0,
    },
  };
  // Apply character stats
  if (charId) {
    const ch = CHARACTERS.find(c => c.id === charId);
    if (ch) {
      if (ch.stats.dmgMult) base.dmgMult = ch.stats.dmgMult;
      if (ch.stats.armor !== undefined) base.armor = ch.stats.armor;
      if (ch.stats.rngMult) base.rngMult = ch.stats.rngMult;
      if (ch.stats.aspdMult) base.aspdMult = ch.stats.aspdMult;
      if (ch.stats.lifesteal !== undefined) base.lifesteal = ch.stats.lifesteal;
      if (ch.weapons) {
        base.weapons = ch.weapons.map(id => ({ id, cd: 0, tier: 0 }));
        base.weapons = ch.weapons.map(id => ({ id, cd: 0 }));
      }
      if (ch.materialBonus) game.materialBonus = ch.materialBonus;
    }
  }
  return base;
}

function createEnemy(type, x, y) {
  const defs = {
    basic: { hp: 3, speed: 50, damage: 1, radius: 12, xp: 1, sprite: SPRITE_BASIC, color: '#c0392b', size: 24 },
    fast: { hp: 1, speed: 110, damage: 1, radius: 9, xp: 1, sprite: SPRITE_FAST, color: '#27ae60', size: 20 },
    heavy: { hp: 10, speed: 35, damage: 2, radius: 16, xp: 3, sprite: SPRITE_HEAVY, color: '#8e44ad', size: 28 },
    ranged: { hp: 2, speed: 45, damage: 1, radius: 10, xp: 2, sprite: SPRITE_FAST, color: '#3498db', size: 22, behavior: 'ranged' },
    exploder: { hp: 2, speed: 90, damage: 2, radius: 11, xp: 2, sprite: SPRITE_BASIC, color: '#e67e22', size: 22, behavior: 'exploder', explodeRadius: 60 },
    summoner: { hp: 6, speed: 30, damage: 1, radius: 14, xp: 4, sprite: SPRITE_HEAVY, color: '#9b59b6', size: 28, behavior: 'summoner', minionCount: 2 },
    elite: { hp: 15, speed: 40, damage: 2, radius: 16, xp: 6, sprite: SPRITE_HEAVY, color: '#f1c40f', size: 32, behavior: 'elite', auraRadius: 150 },
    boss: { hp: 50, speed: 25, damage: 3, radius: 22, xp: 20, sprite: SPRITE_HEAVY, color: '#8e44ad', size: 48, behavior: 'boss' },
  };
  const def = defs[type];
  if (!def) return defs.basic ? createEnemy('basic', x, y) : null;
  const diff = DIFFICULTIES[game.difficulty] || DIFFICULTIES.normal;
  const boost = diff.enemyBoost || 0;
  const enemy = {
    x, y, type,
    hp: def.hp + Math.floor(game.wave * 1.2) + boost,
    maxHp: def.hp + Math.floor(game.wave * 1.2) + boost,
    speed: def.speed + game.wave * 2 + boost * 3,
    damage: def.damage + Math.floor(game.wave * 0.5) + Math.floor(boost * 0.5),
    radius: def.radius,
    xp: def.xp + Math.floor(game.wave * 0.3),
    sprite: def.sprite,
    color: def.color,
    size: def.size,
    vx: 0, vy: 0,
    hitFlash: 0,
  };
  if (def.behavior) enemy.behavior = def.behavior;
  if (def.explodeRadius !== undefined) enemy.explodeRadius = def.explodeRadius;
  if (def.minionCount !== undefined) enemy.minionCount = def.minionCount;
  if (def.auraRadius !== undefined) enemy.auraRadius = def.auraRadius;
  return enemy;
}

function createProjectile(x, y, angle, weapon, player, tierMult) {
  const dmg = weapon.damage * player.dmgMult * (tierMult || 1);
  return {
    x, y,
    vx: Math.cos(angle) * weapon.speed,
    vy: Math.sin(angle) * weapon.speed,
    radius: weapon.aoe > 0 ? 4 : 3,
    damage: dmg,
    aoe: weapon.aoe,
    color: weapon.color,
    knockback: weapon.knockback,
    life: 2.0,
    fromPlayer: true,
  };
}

function createPickup(x, y, amount) {
  return {
    x, y, amount,
    radius: 3,
    life: 8.0,
    bob: Math.random() * Math.PI * 2,
    magnet: false,
  };
}

function createParticle(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 30 + Math.random() * 80;
    game.particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.3 + Math.random() * 0.4,
      maxLife: 0.3 + Math.random() * 0.4,
      radius: 2 + Math.random() * 3,
      color,
    });
  }
}

function createDamageNumber(x, y, amount, color) {
  game.damageNumbers.push({
    x, y,
    text: Math.ceil(amount).toString(),
    color: color || '#fff',
    life: 1.0,
    maxLife: 1.0,
    vy: -50 - Math.random() * 30,

}

// ======================== WEAPON SYSTEM ========================
function fireWeapon(player, weapon, enemy) {
  const def = WEAPON_DEFS[weapon.id];
  if (!def) return 0;
  const tier = TIERS[weapon.tier || 0];
  const dx = enemy.x - player.x;
  const dy = enemy.y - player.y;
  const angle = Math.atan2(dy, dx);
  const range = (def.range || 60) * player.rngMult;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const cd = def.cooldown / player.aspdMult / (1 + (weapon.tier || 0) * 0.12);

  if (def.type === 'melee') {
    if (dist <= range) {
      const dmg = def.damage * player.dmgMult * tier.mult;
      const knockX = Math.cos(angle) * def.knockback;
      const knockY = Math.sin(angle) * def.knockback;
      enemy.hp -= dmg;
      enemy.hitFlash = 0.15;
      createDamageNumber(enemy.x, enemy.y, dmg, '#f39c12');
      enemy.vx += knockX * 0.5;
      enemy.vy += knockY * 0.5;
      if (player.lifesteal > 0) {
        player.hp = Math.min(player.hp + player.lifesteal, player.maxHp);
      }
      createParticle(enemy.x, enemy.y, '#fff', 3);
      playSound('melee_hit');
    }
  } else if (def.type === 'mine') {
    const mine = createProjectile(player.x, player.y, angle, def, player, tier.mult);
    mine.vx = 0; mine.vy = 0;
    mine.isMine = true;
    mine.radius = 6;
    mine.life = 15.0;
    game.projectiles.push(mine);
    playSound('mine_place');
  } else {
    const proj = createProjectile(player.x, player.y, angle, def, player, tier.mult);
    game.projectiles.push(proj);
    if (def.sound) playSound(def.sound);
    if (player.passives.bulletSplit > 0 && Math.random() < player.passives.bulletSplit) {
      const splitAngle = angle + (Math.random() - 0.5) * 0.8;
      const splitProj = createProjectile(player.x, player.y, splitAngle, def, player, tier.mult);
      game.projectiles.push(splitProj);
    }
  }
  return cd;
}function updateWeapons(player, dt) {
  for (const weapon of player.weapons) {
    weapon.cd -= dt;
      const def = WEAPON_DEFS[weapon.id];
      if (!def) continue;
    if (weapon.cd <= 0) {
      const def = WEAPON_DEFS[weapon.id];
      if (!def) continue;
      let target = null;
      let minDist = Infinity;
      const range = (def.range || 60) * player.rngMult;
      for (const enemy of game.enemies) {
        const dx = enemy.x - player.x;
        const dy = enemy.y - player.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < range && dist < minDist) {
          minDist = dist;
          target = enemy;
        }
      }
      if (target) {
        weapon.cd = fireWeapon(player, weapon, target);
      }
    }
  }
}

// ======================== WAVE SYSTEM ========================
function getWaveEnemies(wave) {
  const mult = game.enemyMult || 1;
  const basic = Math.floor((5 + wave * 3) * mult);
  const fast = wave >= 2 ? Math.floor((wave - 1) * 2.5 * mult) : 0;
  const heavy = wave >= 3 ? Math.floor((wave - 2) * 1.5 * mult) : 0;
  const ranged = wave >= 4 ? Math.floor((wave - 2) * 1.2 * mult) : 0;
  const exploder = wave >= 6 ? Math.floor((wave - 4) * 1.0 * mult) : 0;
  const summoner = wave >= 8 ? Math.floor((wave - 6) * 0.8 * mult) : 0;
  const elite = wave >= 10 ? Math.floor((wave - 8) * 0.6 * mult) : 0;
  return { basic, fast, heavy, ranged, exploder, summoner, elite };
}

function getSpawnInterval(wave) {
  const counts = getWaveEnemies(wave);
  const total = counts.basic + counts.fast + counts.heavy + counts.ranged + counts.exploder + counts.summoner + counts.elite;
  return Math.max(0.25, Math.min(getWaveDuration() / Math.max(total, 1), 2.5));
}

function spawnEnemy() {
  const counts = getWaveEnemies(game.wave);
  const types = [];
  for (let i = 0; i < counts.basic; i++) types.push('basic');
  for (let i = 0; i < counts.fast; i++) types.push('fast');
  for (let i = 0; i < counts.heavy; i++) types.push('heavy');
  for (let i = 0; i < counts.ranged; i++) types.push('ranged');
  for (let i = 0; i < counts.exploder; i++) types.push('exploder');
  for (let i = 0; i < counts.summoner; i++) types.push('summoner');
  for (let i = 0; i < counts.elite; i++) types.push('elite');
  // Shuffle types for variety
  for (let i = types.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [types[i], types[j]] = [types[j], types[i]];
  }

  if (game.waveEnemiesSpawned >= types.length) {
    // Boss wave: spawn boss after all minions
    if (game.bossActive && !game.bossSpawned) {
      game.bossSpawned = true;
      const side = Math.floor(Math.random() * 4);
      let x, y;
      const margin = 30;
      const cam = getCamera();
      switch (side) {
        case 0: x = cam.x - margin; y = cam.y + Math.random() * CONFIG.CANVAS_H; break;
        case 1: x = cam.x + CONFIG.CANVAS_W + margin; y = cam.y + Math.random() * CONFIG.CANVAS_H; break;
        case 2: x = cam.x + Math.random() * CONFIG.CANVAS_W; y = cam.y - margin; break;
        case 3: x = cam.x + Math.random() * CONFIG.CANVAS_W; y = cam.y + CONFIG.CANVAS_H + margin; break;
      }
      x = Math.max(0, Math.min(CONFIG.ARENA_W, x));
      y = Math.max(0, Math.min(CONFIG.ARENA_H, y));
      game.enemies.push(createEnemy('boss', x, y));
      playSound('boss_spawn');
      game.waveEnemiesSpawned++;
    }
    return;
  }
  const type = types[game.waveEnemiesSpawned];

  // Spawn from random edge
  const side = Math.floor(Math.random() * 4);
  let x, y;
  const margin = 30;
  const cam = getCamera();
  switch (side) {
    case 0: x = cam.x - margin; y = cam.y + Math.random() * CONFIG.CANVAS_H; break;
    case 1: x = cam.x + CONFIG.CANVAS_W + margin; y = cam.y + Math.random() * CONFIG.CANVAS_H; break;
    case 2: x = cam.x + Math.random() * CONFIG.CANVAS_W; y = cam.y - margin; break;
    case 3: x = cam.x + Math.random() * CONFIG.CANVAS_W; y = cam.y + CONFIG.CANVAS_H + margin; break;
  }
  x = Math.max(0, Math.min(CONFIG.ARENA_W, x));
  y = Math.max(0, Math.min(CONFIG.ARENA_H, y));

  game.enemies.push(createEnemy(type, x, y));
  game.waveEnemiesSpawned++;
}

function startWave() {
  game.state = 'playing';
  playSound('wave_start');
  const counts = getWaveEnemies(game.wave);
  game.bossActive = (game.wave % 5 === 0);
  game.bossSpawned = false;
  game.bossDefeated = false;
  game.waveEnemiesTotal = counts.basic + counts.fast + counts.heavy + counts.ranged + counts.exploder + counts.summoner + counts.elite;
  if (game.bossActive) game.waveEnemiesTotal += 1;
  game.waveEnemiesSpawned = 0;
  game.waveTimer = 0;
  game.spawnTimer = 0;
}

function endWave() {
  if (game.state !== 'playing') return;
  if (game.bossActive && !game.bossDefeated) return;
  game.enemies = [];
  game.projectiles = [];
  game.materials += 3 + game.wave * 2;
  if (game.wave >= CONFIG.TOTAL_WAVES) {
    game.state = 'won';
    saveRecord('victory');
    showOverlay('victory');
    return;
  }
  showShop();
}

function combineUI() {
  const p = game.player;
  // Group weapons by (tier, weaponId)
  const groups = {};
  for (const w of p.weapons) {
    const t = w.tier || 0;
    const key = t + '_' + w.id;
    if (!groups[key]) groups[key] = { tier: t, id: w.id, count: 0 };
    groups[key].count++;
  }
  const need = gameSettings.combineCount || 3;
  let html = '<div style="font-size:9px;color:#aaa;margin-top:6px;text-align:left">';
  html += '<div style="color:#9b59b6;font-size:10px;margin-bottom:4px">━━ 武器合成 (' + need + '合1) ━━</div>';
  let hasCombinable = false;
  for (const key of Object.keys(groups).sort()) {
    const g = groups[key];
    if (g.count < need) continue;
    const def = WEAPON_DEFS[g.id];
    if (!def) continue;
    if (g.tier >= 4) continue; // 传说不可再合成
    hasCombinable = true;
    const tierData = TIERS[g.tier];
    const nextTier = TIERS[g.tier + 1];
    html += `<div style="margin-bottom:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <span>${def.icon}</span>
      <span style="color:${tierData.color}">${g.count}x ${def.name}[${tierData.name}]</span>
      <span style="color:#666">→</span>
      <span style="color:${nextTier.color}">1x ${def.name}[${nextTier.name}]</span>
      <button onclick="combineWeapons(${g.tier},'${g.id}')" style="padding:2px 8px;font-size:9px;background:#8e44ad;color:#fff;border:none;cursor:pointer;font-family:'Courier New',monospace">合成</button>
    </div>`;
  }
  if (!hasCombinable) {
    html += '<div style="color:#555;font-size:8px">需要' + need + '把同类型同品质武器才能合成</div>';
  }
  html += '</div>';
  return html;
}

function combineWeapons(tier, weaponId) {
  const p = game.player;
  const need = gameSettings.combineCount || 3;
  const same = p.weapons.filter(w => (w.tier || 0) === tier && w.id === weaponId);
  if (same.length < need) return;
  const consumed = same.slice(0, need);
  for (const w of consumed) {
    const idx = p.weapons.indexOf(w);
    if (idx !== -1) p.weapons.splice(idx, 1);
  }
  p.weapons.push({ id: weaponId, cd: 0, tier: tier + 1 });
  playSound('level_up');
  renderShop();
}

function showShop() {
  game.state = 'shopping';
  document.getElementById('overlay').classList.add('show');
  document.getElementById('overlayTitle').textContent = '商店';
  document.getElementById('overlayTitle').style.color = '#f39c12';
  document.getElementById('overlaySub').textContent = `波次 ${game.wave} 结束`;
  document.getElementById('restartBtn').style.display = 'none';

  // Generate weapons-only pool
  const pool = [];
  for (const [wid, def] of Object.entries(WEAPON_DEFS)) {
    if (wid === 'stick') continue;
    const tier = getWeaponShopTier(game.wave);
    const tierData = TIERS[tier];
    const cost = Math.floor(def.cost * TIER_COST_MULT[tier]);
    pool.push({
      type: 'weapon', id: 'w_' + wid,
      name: def.icon + ' ' + def.name,
      icon: def.icon, cost,
      desc: def.desc,
      tier, tierName: tierData.name, tierColor: tierData.color,
      weaponId: wid,
    });
  }
  // Shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  game.shopItems = pool.slice(0, 4);
  game.shopRerolls = 0;

  renderShop();
}

function renderShop() {
  const content = document.getElementById('overlayContent');
  const p = game.player;
  let html = `<div id="material-count">材料: ${game.materials}</div>`;
  html += '<div class="shop-grid">';

  for (const entry of game.shopItems) {
    const owned = p.weapons.some(w => w.id === entry.weaponId);
    const maxWeapons = p.weapons.length >= CONFIG.MAX_WEAPONS;
    const disabled = game.materials < entry.cost || owned || maxWeapons;
    const tierColor = entry.tierColor || '#555';
    html += `<div class="shop-item${disabled ? ' disabled' : ''}" style="border-color:${tierColor}" onclick="${disabled ? '' : `buyWeapon('${entry.weaponId}',${entry.tier},${entry.cost})`}">`;
    html += `<div class="name" style="color:${tierColor}">${entry.name}</div>`;
    html += `<div class="cost">💰 ${entry.cost} · <span style="color:${tierColor}">${entry.tierName}</span></div>`;
    html += `<div class="desc">${entry.desc}</div>`;
    html += '</div>';
  }

  html += '</div>';

  // Weapon combine section
  html += combineUI();

  // Sell weapon section
  html += '<div style="font-size:9px;color:#aaa;margin-top:6px;text-align:left">';
  html += '<div style="color:#e74c3c;font-size:10px;margin-bottom:4px">━━ 出售武器 ━━</div>';
  html += '<div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center">';
  for (let i = 0; i < p.weapons.length; i++) {
    const w = p.weapons[i];
    const def = WEAPON_DEFS[w.id];
    const tierData = TIERS[w.tier || 0];
    const sellPrice = Math.floor(def.cost * TIER_COST_MULT[w.tier || 0]);
    const canSell = p.weapons.length > 1;
    html += `<div style="border:1px solid ${tierData.color};border-radius:3px;padding:4px 6px;font-size:8px;text-align:center;${canSell ? 'cursor:pointer' : 'opacity:0.5'}" onclick="${canSell ? `sellWeapon(${i})` : ''}">`;
    html += `<div>${def.icon}</div>`;
    html += `<div style="color:${tierData.color}">${def.name}</div>`;
    html += `<div style="color:#f1c40f;font-size:7px">💰 ${sellPrice}</div>`;
    html += '</div>';
  }
  html += '</div></div>';

  html += getStatsHTML();
  html += '<div class="shop-controls">';
  const rerollCost = 3 + game.shopRerolls * 2;
  html += `<button class="btn-reroll" onclick="rerollShop()">刷新 (💰 ${rerollCost})</button>`;
  html += `<button class="btn-continue" onclick="continueGame()">继续 →</button>`;

  // Show weapon stock warning when full
  if (p.weapons.length >= CONFIG.MAX_WEAPONS) {
    html += '<div style="font-size:8px;color:#888;margin-top:4px">武器栏已满</div>';
  }

  html += '</div>';

  content.innerHTML = html;
}

function buyWeapon(id, tier, cost) {
  const p = game.player;
  if (p.weapons.length >= CONFIG.MAX_WEAPONS) return;
  if (game.materials < cost) return;
  game.materials -= cost;
  p.weapons.push({ id, cd: 0, tier });
  // 从商店格子移除该武器
  const idx = game.shopItems.findIndex(e => e.type === 'weapon' && e.weaponId === id);
  if (idx !== -1) game.shopItems.splice(idx, 1);
  playSound('buy');
  renderShop();
}

function rerollShop() {
  const cost = 3 + game.shopRerolls * 2;
  if (game.materials < cost) return;
  game.materials -= cost;
  game.shopRerolls++;
  const pool = [];
  for (const [wid, def] of Object.entries(WEAPON_DEFS)) {
    if (wid === 'stick') continue;
    const tier = getWeaponShopTier(game.wave);
    const tierData = TIERS[tier];
    const wcost = Math.floor(def.cost * TIER_COST_MULT[tier]);
    pool.push({
      type: 'weapon', id: 'w_' + wid,
      name: def.icon + ' ' + def.name,
      icon: def.icon, cost: wcost,
      desc: def.desc,
      tier, tierName: tierData.name, tierColor: tierData.color,
      weaponId: wid,
    });
  }
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  game.shopItems = pool.slice(0, 4);
  renderShop();
}

function sellWeapon(index) {
  const p = game.player;
  if (p.weapons.length <= 1) return;
  if (index < 0 || index >= p.weapons.length) return;
  const w = p.weapons[index];
  const def = WEAPON_DEFS[w.id];
  if (!def) return;
  const sellPrice = Math.floor(def.cost * TIER_COST_MULT[w.tier || 0]);
  game.materials += sellPrice;
  p.weapons.splice(index, 1);
  playSound('buy');
  renderShop();
}

function continueGame() {
  document.getElementById('overlay').classList.remove('show');
  // Check for level up
  if (game.xp >= game.xpNext) {
    showLevelUp();
  } else {
    game.wave++;
    startWave();
  }
}

function showLevelUp() {
  game.state = 'levelup';
  playSound('level_up');
  document.getElementById('overlay').classList.add('show');
  document.getElementById('overlayTitle').textContent = '升级!';
  document.getElementById('overlayTitle').style.color = '#2ecc71';
  document.getElementById('overlaySub').textContent = `等级 ${game.level + 1}`;
  document.getElementById('restartBtn').style.display = 'none';
  
  // Pick 3 random upgrades (stat boosts + passive items)
  const pool = [...UPGRADES, ...SHOP_ITEMS];
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  game.upgradeChoices = pool.slice(0, 3);
  
  renderUpgrades();
}

function renderUpgrades() {
  const content = document.getElementById('overlayContent');
  let html = '<div class="upgrade-grid">';
  for (const upg of game.upgradeChoices) {
    html += `<div class="upgrade-card" onclick="applyUpgrade('${upg.id}')">`;
    html += `<div class="name">${upg.icon} ${upg.name}</div>`;
    html += `<div class="desc">${upg.desc}</div>`;
    html += '</div>';
  }
  html += '</div>';
  html += getStatsHTML();
  content.innerHTML = html;
}

function applyUpgrade(id) {
  const p = game.player;
  const choice = game.upgradeChoices.find(c => c.id === id);
  if (!choice) return;
  if (choice.effect) {
    choice.effect(p);
  } else {
    switch (id) {
      case 'maxhp': p.maxHp += 4; p.hp += 4; break;
      case 'dmg': p.dmgMult *= 1.2; break;
      case 'aspd': p.aspdMult *= 1.2; break;
      case 'armor': p.armor += 1; break;
      case 'spd': p.spdMult *= 1.1; break;
      case 'range': p.rngMult *= 1.15; break;
      case 'regen': p.hp = Math.min(p.hp + 5, p.maxHp); break;
      case 'lifesteal': p.lifesteal += 1; break;
    }
  }
  game.level++;
  game.xp -= game.xpNext;
  game.xpNext = Math.floor(game.xpNext * 1.22) + 2;

  document.getElementById('overlay').classList.remove('show');
  // 恢复游戏，倒计时继续
  game.state = 'playing';
}

// ======================== GAME UPDATE ========================
function getCamera() {
  const p = game.player;
  return {
    x: p.x - CONFIG.CANVAS_W / 2,
    y: p.y - CONFIG.CANVAS_H / 2,
  };
}

function dist(a, b) {
  return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
}

function updateGame(dt) {
  if (game.state !== 'playing') return;
  game.time += dt;
  
  const p = game.player;
  if (p.invincible > 0) p.invincible -= dt;
  if (game.shakeTimer > 0) game.shakeTimer -= dt;
  if (game.freezeFrames > 0) { game.freezeFrames--; dt *= 0.1; }
  
  // Player movement
  let mx = 0, my = 0;
  if (keys.w) my -= 1;
  if (keys.s) my += 1;
  if (keys.a) mx -= 1;
  if (keys.d) mx += 1;
  if (mx !== 0 && my !== 0) { mx *= 0.707; my *= 0.707; }
  p.x += mx * p.speed * p.spdMult * dt;
  p.y += my * p.speed * p.spdMult * dt;
  p.x = Math.max(p.radius, Math.min(CONFIG.ARENA_W - p.radius, p.x));
  p.y = Math.max(p.radius, Math.min(CONFIG.ARENA_H - p.radius, p.y));
  if (mx !== 0 || my !== 0) p.angle = Math.atan2(my, mx);
  
  // Weapons auto-aim
  updateWeapons(p, dt);
  
  // Spawn enemies
  game.spawnTimer -= dt;
  if (game.spawnTimer <= 0 && game.waveEnemiesSpawned < game.waveEnemiesTotal) {
    spawnEnemy();
    game.spawnTimer = getSpawnInterval(game.wave);
  }
  
  // Update enemies
  for (let i = game.enemies.length - 1; i >= 0; i--) {
    const e = game.enemies[i];
    const dx = p.x - e.x;
    const dy = p.y - e.y;
    const d = Math.sqrt(dx * dx + dy * dy) || 1;
    e.vx += (dx / d) * e.speed * dt * 3;
    e.vy += (dy / d) * e.speed * dt * 3;
    e.vx *= 0.9;
    e.vy *= 0.9;
    e.x += e.vx * dt;
    e.y += e.vy * dt;
    e.x = Math.max(0, Math.min(CONFIG.ARENA_W, e.x));
    e.y = Math.max(0, Math.min(CONFIG.ARENA_H, e.y));

	    // Behavior-specific AI
	    if (e.behavior === 'ranged') {
	      if (!e.shootTimer) e.shootTimer = 1.5;
	      e.shootTimer -= dt;
	      if (e.shootTimer <= 0) {
	        e.shootTimer = 1.2 + Math.random() * 0.6;
	        const eAngle = Math.atan2(p.y - e.y, p.x - e.x);
	        game.projectiles.push({
	          x: e.x, y: e.y,
	          vx: Math.cos(eAngle) * 150,
	          vy: Math.sin(eAngle) * 150,
	          radius: 3, damage: 1, aoe: 0,
	          color: '#87ceeb', knockback: 30, life: 2.0,
	          fromPlayer: false, penetrate: false, isMine: false,
	        });
	      }
	      const distToP = Math.sqrt(dx * dx + dy * dy);
	      if (distToP < 180) { e.vx -= (dx / distToP) * e.speed * dt * 2; e.vy -= (dy / distToP) * e.speed * dt * 2; }
	    } else if (e.behavior === 'exploder') {
	      e.vx += (dx / d) * e.speed * dt * 2;
	      e.vy += (dy / d) * e.speed * dt * 2;
	    } else if (e.behavior === 'elite') {
	      for (const other of game.enemies) {
	        if (other !== e && dist(e, other) < e.auraRadius) {
	          const odx = e.x - other.x;
	          const ody = e.y - other.y;
	          const od = Math.sqrt(odx * odx + ody * ody) || 1;
	          other.vx += (odx / od) * 30 * dt;
	          other.vy += (ody / od) * 30 * dt;
	        }
	      }
	    } else if (e.behavior === 'boss') {
	      const distToP = Math.sqrt(dx * dx + dy * dy);
	      if (!e.bossActionTimer) e.bossActionTimer = 2.0;
	      e.bossActionTimer -= dt;
	      if (e.bossActionTimer <= 0) {
	        e.bossPhase = Math.floor(Math.random() * 3);
	        e.bossActionTimer = 2.5 + Math.random() * 1.5;
	      }
	      switch (e.bossPhase) {
	        case 0:
	          e.vx += (dx / d) * e.speed * dt * 5;
	          e.vy += (dy / d) * e.speed * dt * 5;
	          if (d < p.radius + e.radius + 5 && p.invincible <= 0) {
	            p.hp -= 2; p.invincible = 0.3; game.shakeTimer = 0.2;
	          }
	          break;
	        case 1:
	          createParticle(e.x, e.y, '#8e44ad', 2);
	          if (distToP < 120) {
	            p.hp -= 1; game.shakeTimer = 0.1;
	          }
	          break;
	        case 2:
	          for (let si = 0; si < 2 + Math.floor(game.wave / 5); si++) {
	            game.enemies.push(createEnemy('basic',
	              e.x + (Math.random() - 0.5) * 80,
	              e.y + (Math.random() - 0.5) * 80));
	          }
	          e.bossPhase = 0;
	          break;
	      }
	    }
	    
    
    if (e.hitFlash > 0) e.hitFlash -= dt;
    
    // Enemy-player collision
    if (d < p.radius + e.radius) {
      if (p.invincible <= 0) {
        const dmg = Math.max(0, e.damage - p.armor);
        if (p.passives.dodge > 0 && Math.random() < p.passives.dodge) {
          createDamageNumber(p.x, p.y, 0, '#3498db');
          playSound('dodge');
        } else {
          p.hp -= dmg;
          playSound('player_hit');
          if (p.passives.thorns > 0) {
            e.hp -= p.passives.thorns;
            createDamageNumber(e.x, e.y, p.passives.thorns, '#27ae60');
          }
        }
        p.invincible = 0.5;
        createParticle(p.x, p.y, '#e74c3c', 8);
        game.shakeTimer = 0.1;
        if (p.hp <= 0) {
          p.hp = 0;
          gameOver();
          return;
        }
      }
      // Push enemy back
      const push = 80;
      e.vx -= (dx / d) * push;
      e.vy -= (dy / d) * push;
    }
    
    // Check if enemy dead
    if (e.hp <= 0) {
      const matDrop = e.type === 'heavy' ? 3 : (e.type === 'fast' ? 1 : 2);
      for (let m = 0; m < matDrop; m++) {
        game.pickups.push(createPickup(
          e.x + (Math.random() - 0.5) * 20,
          e.y + (Math.random() - 0.5) * 20,
          1
        ));
      }
      game.enemiesKilled++;
      game.xp += e.xp;
      createParticle(e.x, e.y, e.color, 6);
      playSound('enemy_kill');
	      if (p.passives.explodeOnKill) {
	        for (const other of game.enemies) {
	          if (other !== e && dist(e, other) < 60) {
	            other.hp -= 5;
	            other.hitFlash = 0.15;
	          }
	        }
	        createParticle(e.x, e.y, '#e67e22', 15);
	      }
	      
      // Exploder death
      if (e.behavior === 'exploder') {
        if (dist(e, p) < (e.explodeRadius || 60)) {
          p.hp -= 2;
          createDamageNumber(p.x, p.y, 2, '#e67e22');
        }
        createParticle(e.x, e.y, '#e67e22', 20);
        game.shakeTimer = 0.15;
        playSound('explosion');
      }
      // Summoner death
      if (e.behavior === 'summoner') {
        for (let si = 0; si < (e.minionCount || 2); si++) {
          game.enemies.push(createEnemy('basic',
            e.x + (Math.random() - 0.5) * 40,
            e.y + (Math.random() - 0.5) * 40));
        }
      }
      if (e.type === 'boss') {
        game.bossDefeated = true;
        createParticle(e.x, e.y, '#8e44ad', 40);
        game.shakeTimer = 0.5;
        playSound('boss_kill');
      }
      game.enemies.splice(i, 1);
    }
  }
  
  // Update projectiles
  for (let i = game.projectiles.length - 1; i >= 0; i--) {
    const proj = game.projectiles[i];
    proj.x += proj.vx * dt;
    proj.y += proj.vy * dt;
    proj.life -= dt;
    
    let destroyed = false;
    if (proj.life <= 0 || proj.x < -50 || proj.x > CONFIG.ARENA_W + 50 || proj.y < -50 || proj.y > CONFIG.ARENA_H + 50) {
      destroyed = true;
    } else {
      // Check collision based on projectile owner
      if (proj.fromPlayer) {
        for (let j = game.enemies.length - 1; j >= 0; j--) {
          const e = game.enemies[j];
          if (dist(proj, e) < proj.radius + e.radius) {
            if (proj.aoe > 0) {
              // AOE explosion) {
            // AOE explosion
            for (const other of game.enemies) {
              if (dist(proj, other) < proj.aoe) {
                const aoeDmg = proj.damage * 0.7;
                other.hp -= aoeDmg;
                other.hitFlash = 0.15;
                createDamageNumber(other.x, other.y, aoeDmg, '#e74c3c');
                const ang = Math.atan2(other.y - proj.y, other.x - proj.x);
                other.vx += Math.cos(ang) * proj.knockback * 0.5;
                other.vy += Math.sin(ang) * proj.knockback * 0.5;
              }
            }
            if (p.lifesteal > 0) {
              p.hp = Math.min(p.hp + p.lifesteal, p.maxHp);
            }
            createParticle(proj.x, proj.y, '#e74c3c', 12);
            game.shakeTimer = 0.15;
            playSound(proj.isMine ? 'mine_explode' : 'explosion');

          
            } else {
              e.hp -= proj.damage;
              e.hitFlash = 0.15;
              createDamageNumber(e.x, e.y, proj.damage, '#fff');
              const ang = Math.atan2(e.y - proj.y, e.x - proj.x);
              e.vx += Math.cos(ang) * proj.knockback;
              e.vy += Math.sin(ang) * proj.knockback;
              if (p.lifesteal > 0) {
                p.hp = Math.min(p.hp + p.lifesteal, p.maxHp);
              }
              createParticle(e.x, e.y, '#fff', 3);
              playSound('enemy_hit');
            }
            if (!proj.penetrate) destroyed = true;
            break;
          }
        }
        // Enemy projectile hits player
      } else if (!proj.fromPlayer && dist(proj, p) < proj.radius + p.radius) {
        const pDmg = Math.max(0, proj.damage - p.armor);
        p.hp -= pDmg;
        p.invincible = 0.3;
        createParticle(p.x, p.y, '#e74c3c', 6);
        playSound('player_hit');
        p.hp -= proj.damage;
        p.invincible = 0.3;
        createParticle(p.x, p.y, '#e74c3c', 6);
        playSound('player_hit');
        destroyed = true;
        if (p.hp <= 0) { p.hp = 0; gameOver(); return; }
      }
    }
    if (destroyed) {
      game.projectiles.splice(i, 1);
    }
  }

  // Update pickups
  for (let i = game.pickups.length - 1; i >= 0; i--) {
    const pu = game.pickups[i];
    pu.life -= dt;
    pu.bob += dt * 3;
    if (pu.life <= 0) { game.pickups.splice(i, 1); continue; }
    
    // Magnet: pull toward player if close
    const d = dist(pu, p);
    if (d < p.passives.magnetRange) {
      const speed = 200 * (1 - d / p.passives.magnetRange);
      pu.x += (p.x - pu.x) / d * speed * dt || 0;
      pu.y += (p.y - pu.y) / d * speed * dt || 0;
    }
    
    if (d < p.radius + pu.radius + 5) {
      game.materials += pu.amount;
      game.pickups.splice(i, 1);
      playSound('pickup');
    }
  }
  
  // Update particles
  for (let i = game.particles.length - 1; i >= 0; i--) {
    const pt = game.particles[i];
    pt.x += pt.vx * dt;
    pt.y += pt.vy * dt;
    pt.vx *= 0.9;
    pt.vy *= 0.9;
    pt.life -= dt;
    if (pt.life <= 0) game.particles.splice(i, 1);
  }
  
  // Update damage numbers
  for (let i = game.damageNumbers.length - 1; i >= 0; i--) {
    const dn = game.damageNumbers[i];
    dn.y += dn.vy * dt;
    dn.x += dn.vx * dt;
    dn.life -= dt;
    if (dn.life <= 0) game.damageNumbers.splice(i, 1);
  }
  
  // Wave timer
  game.waveTimer += dt;
  if (game.waveTimer >= getWaveDuration()) {
    endWave();
    return;
  }
  
  // Level up check
  if (game.xp >= game.xpNext && game.state === 'playing') {
    showLevelUp();
  }
  
  // Update HUD
  updateHUD();
}

// ======================== RENDERING ========================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

function render() {
  ctx.save();
  
  // Screen shake
  if (game.shakeTimer > 0) {
    const intensity = game.shakeTimer * 8;
    ctx.translate(
      (Math.random() - 0.5) * intensity,
      (Math.random() - 0.5) * intensity
    );
  }
  
  const cam = getCamera();
  const p = game.player;
  
  // Background grid
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, CONFIG.CANVAS_W, CONFIG.CANVAS_H);
  
  // Draw grid
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  const gridSize = 40;
  const startX = -(cam.x % gridSize);
  const startY = -(cam.y % gridSize);
  for (let x = startX; x < CONFIG.CANVAS_W; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CONFIG.CANVAS_H); ctx.stroke();
  }
  for (let y = startY; y < CONFIG.CANVAS_H; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CONFIG.CANVAS_W, y); ctx.stroke();
  }
  
  // Arena border
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 3;
  ctx.strokeRect(-cam.x, -cam.y, CONFIG.ARENA_W, CONFIG.ARENA_H);
  
  // Draw pickups
  for (const pu of game.pickups) {
    const sx = pu.x - cam.x;
    const sy = pu.y - cam.y + Math.sin(pu.bob) * 2;
    ctx.fillStyle = '#f1c40f';
    ctx.beginPath();
    ctx.arc(sx, sy, pu.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(241,196,15,0.2)';
    ctx.beginPath();
    ctx.arc(sx, sy, pu.radius + 2, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Draw enemies
  for (const e of game.enemies) {
    const sx = e.x - cam.x;
    const sy = e.y - cam.y;
    const spriteSize = e.size;
    // Elite aura
    if (e.behavior === 'elite') {
      const pulse = 0.3 + Math.sin(game.time * 3) * 0.2;
      ctx.fillStyle = `rgba(241,196,15,${pulse})`;
      ctx.beginPath();
      ctx.arc(sx, sy, e.size + 12, 0, Math.PI * 2);
      ctx.fill();
    }
    
    
    const flashAlpha = Math.min(e.hitFlash * 5, 0.6);
    drawSprite(ctx, e.sprite, PALETTE, sx - spriteSize/2, sy - spriteSize/2, spriteSize, e.color);
    if (e.hitFlash > 0) {
      ctx.fillStyle = `rgba(255,0,0,${flashAlpha})`;
      ctx.fillRect(sx - spriteSize/2, sy - spriteSize/2, spriteSize, spriteSize);
    }
    
    // HP bar for enemies that have taken damage
    if (e.hp < e.maxHp) {
      const bw = spriteSize + 4;
      const barY = sy - spriteSize/2 - 6;
      ctx.fillStyle = '#333';
      ctx.fillRect(sx - bw/2, barY, bw, 3);
      ctx.fillStyle = '#e74c3c';
      ctx.fillRect(sx - bw/2, barY, bw * (e.hp / e.maxHp), 3);
    }
  }
  
  // Draw player
  const psx = p.x - cam.x;
  const psy = p.y - cam.y;
  const pSize = 30;
  
  if (p.invincible > 0 && Math.floor(p.invincible * 10) % 2 === 0) {
    // Flicker when invincible
  } else {
    drawSprite(ctx, SPRITE_POTATO, PALETTE, psx - pSize/2, psy - pSize/2, pSize, p.color);
  }
  
  // Player direction indicator
  if (p.angle !== 0) {
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(psx + Math.cos(p.angle) * p.radius, psy + Math.sin(p.angle) * p.radius);
    ctx.lineTo(psx + Math.cos(p.angle) * (p.radius + 10), psy + Math.sin(p.angle) * (p.radius + 10));
    ctx.stroke();
  }
  
  // Draw orbiting weapons
  const orbitRadius = 26;
  const orbitSpeed = 2;
  for (let i = 0; i < p.weapons.length; i++) {
    const w = p.weapons[i];
    const def = WEAPON_DEFS[w.id];
    if (!def) continue;
    const tierData = TIERS[w.tier || 0];
    const ang = game.time * orbitSpeed + (i / p.weapons.length) * Math.PI * 2;
    const ox = psx + Math.cos(ang) * orbitRadius;
    const oy = psy + Math.sin(ang) * orbitRadius;
    // Background circle with tier color
    ctx.beginPath();
    ctx.arc(ox, oy, 10, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fill();
    ctx.strokeStyle = tierData.color;
    ctx.lineWidth = 2;
    ctx.stroke();
    // Weapon icon
    ctx.font = '14px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(def.icon, ox, oy);
  }

  // Draw projectiles
  for (const proj of game.projectiles) {
    if (proj.isMine) {
      const msx = proj.x - cam.x;
      const msy = proj.y - cam.y;
      const pulse = 1 + Math.sin(game.time * 3) * 0.15;
      ctx.fillStyle = '#555';
      ctx.fillRect(msx - 5 * pulse, msy - 5 * pulse, 10 * pulse, 10 * pulse);
      ctx.fillStyle = `rgba(255,0,0,${0.3 + Math.sin(game.time * 4) * 0.2})`;
      ctx.fillRect(msx - 3 * pulse, msy - 3 * pulse, 6 * pulse, 6 * pulse);
    } else {
    const sx = proj.x - cam.x;
    const sy = proj.y - cam.y;
    if (proj.aoe > 0) {
      // Rocket - bigger
      ctx.fillStyle = proj.color;
      ctx.beginPath();
      ctx.arc(sx, sy, proj.radius + 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,100,0.5)';
      ctx.beginPath();
      ctx.arc(sx, sy, proj.radius + 5, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = proj.color;
      ctx.beginPath();
      ctx.arc(sx, sy, proj.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath();
      ctx.arc(sx, sy, proj.radius * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
    }
  }
  
  // Draw particles
  for (const pt of game.particles) {
    const sx = pt.x - cam.x;
    const sy = pt.y - cam.y;
    const alpha = pt.life / pt.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = pt.color;
    ctx.fillRect(sx - pt.radius/2, sy - pt.radius/2, pt.radius, pt.radius);
  }
  ctx.globalAlpha = 1;

  // Draw damage numbers
  for (const dn of game.damageNumbers) {
    const sx = dn.x - cam.x;
    const sy = dn.y - cam.y;
    const alpha = dn.life / dn.maxLife;
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 14px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.strokeText(dn.text, sx, sy);
    ctx.fillStyle = dn.color;
    ctx.fillText(dn.text, sx, sy);
  }
  ctx.globalAlpha = 1;
  
  ctx.restore();

  // ======================== UI OVERLAYS (screen space) ========================
  if (game.state === 'playing' || game.state === 'paused') {
    const p = game.player;
    if (!p) return;

    // ---- Minimap (右上角) ----
    const mmW = 140, mmH = 105;
    const mmX = CONFIG.CANVAS_W - mmW - 8;
    const mmY = 8;
    const mmS = mmW / CONFIG.ARENA_W;

    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(mmX, mmY, mmW, mmH);
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1;
    ctx.strokeRect(mmX, mmY, mmW, mmH);

    // Arena border on minimap
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.strokeRect(mmX, mmY, CONFIG.ARENA_W * mmS, CONFIG.ARENA_H * mmS);

    // Player dot
    const mpx = mmX + p.x * mmS;
    const mpy = mmY + p.y * mmS;
    ctx.fillStyle = '#2ecc71';
    ctx.beginPath();
    ctx.arc(mpx, mpy, 3, 0, Math.PI * 2);
    ctx.fill();

    // Enemy dots
    ctx.fillStyle = '#e74c3c';
    for (const e of game.enemies) {
      ctx.beginPath();
      ctx.arc(mmX + e.x * mmS, mmY + e.y * mmS, 2, 0, Math.PI * 2);
      ctx.fill();
    }

    // Pickup dots
    ctx.fillStyle = '#f1c40f';
    for (const pu of game.pickups) {
      ctx.beginPath();
      ctx.arc(mmX + pu.x * mmS, mmY + pu.y * mmS, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // ---- Combat Stats (左下角, Tab 切换) ----
    if (game.showCombatStats) {
      const sx = 8, sy = CONFIG.CANVAS_H - 170;
      const sw = 195, sh = 162;
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillRect(sx, sy, sw, sh);
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 1;
      ctx.strokeRect(sx, sy, sw, sh);

      ctx.font = '11px "Courier New", monospace';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      const lines = [
        { text: `HP: ${Math.ceil(p.hp)}/${p.maxHp}`, color: '#e74c3c' },
        { text: `护甲: ${Math.max(0, p.armor)}`, color: '#3498db' },
        { text: `伤害: ${(p.dmgMult * 100).toFixed(0)}%`, color: '#fff' },
        { text: `攻速: ${(p.aspdMult * 100).toFixed(0)}%`, color: '#fff' },
        { text: `移速: ${(p.spdMult * 100).toFixed(0)}%`, color: '#fff' },
        { text: `射程: ${(p.rngMult * 100).toFixed(0)}%`, color: '#fff' },
        { text: `生命偷取: ${p.lifesteal}`, color: '#e74c3c' },
        { text: `闪避: ${(p.passives.dodge * 100).toFixed(0)}%`, color: '#2ecc71' },
        { text: `荆棘: ${p.passives.thorns}`, color: '#27ae60' },
        { text: `拾取范围: ${p.passives.magnetRange.toFixed(0)}`, color: '#f39c12' },
      ];
      for (let i = 0; i < lines.length; i++) {
        ctx.fillStyle = lines[i].color;
        ctx.fillText(lines[i].text, sx + 8, sy + 8 + i * 15);
      }
    }
  }
}

function updateHUD() {
  if (!game.player) return;
  const p = game.player;
  document.getElementById('hpFill').style.width = `${(p.hp / p.maxHp) * 100}%`;
  document.getElementById('hpText').textContent = `${Math.ceil(p.hp)}/${p.maxHp}`;
  document.getElementById('shieldDisplay').textContent = `🛡️ ${Math.max(0, p.armor)}`;
  document.getElementById('waveText').textContent = `波次: ${game.wave}/${CONFIG.TOTAL_WAVES}`;
  document.getElementById('levelText').textContent = `等级 ${game.level}`;
  document.getElementById('materialsText').textContent = `材料: ${game.materials}`;
  document.getElementById('xpFill').style.width = `${Math.min(100, (game.xp / game.xpNext) * 100)}%`;
  
  // Stats panel (右上角)
  const waveRemaining = game.state === 'playing' ? Math.ceil(Math.max(0, getWaveDuration() - game.waveTimer)) : 0;
  document.getElementById('statsPanel').innerHTML =
    `⏱ ${waveRemaining}s &nbsp;⚔️ ${(p.dmgMult * 100).toFixed(0)}% ⏩ ${(p.aspdMult * 100).toFixed(0)}% 🛡️ ${Math.max(0, p.armor)}`;
  
  // Weapon bar
  const wbar = document.getElementById('weapon-bar');
  wbar.innerHTML = '';
  const tooltip = document.getElementById('weapon-tooltip');
  for (let i = 0; i < CONFIG.MAX_WEAPONS; i++) {
    const slot = document.createElement('div');
    slot.className = 'weapon-slot';
    if (i < p.weapons.length) {
      const w = p.weapons[i];
      const def = WEAPON_DEFS[w.id];
      const tierData = TIERS[w.tier || 0];
      const tierMult = tierData.mult;
      slot.style.borderColor = tierData.color;
      slot.innerHTML = `<div class="w-icon">${def.icon}</div><div>${def.name}</div><div style="font-size:6px;color:${tierData.color}">${tierData.name}</div>`;
      const tooltipText = `${def.icon} ${def.name}\n⚔️ 伤害:${Math.ceil(def.damage * tierMult)} (${def.damage}×${tierMult.toFixed(1)})\n⏱ CD:${def.cooldown.toFixed(2)}s | 📡 范围:${def.range || 0} | ${def.type === 'ranged' ? '🏹远程' : def.type === 'melee' ? '⚔️近战' : '💣地雷'}`;
      slot.onmouseenter = () => { tooltip.textContent = tooltipText; tooltip.style.display = 'block'; };
      slot.onmouseleave = () => { tooltip.style.display = 'none'; };
    } else {
      slot.innerHTML = '<div style="color:#333">-</div>';
    }
    wbar.appendChild(slot);
  }

  // Boss HP bar
  const bossHud = document.getElementById('boss-hud');
  const boss = game.enemies.find(e => e.type === 'boss');
  if (boss) {
    bossHud.style.display = 'block';
    document.getElementById('bossHpFill').style.width = `${(boss.hp / boss.maxHp) * 100}%`;
  } else {
    bossHud.style.display = 'none';
  }
}

// ======================== AUDIO SYSTEM (Web Audio API) ========================
let audioCtx = null;
let noiseBuffer = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const sr = audioCtx.sampleRate;
    const len = Math.floor(sr * 0.5);
    noiseBuffer = audioCtx.createBuffer(1, len, sr);
    const d = noiseBuffer.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function noiseBurst(duration, volume, hpFreq) {
  const src = audioCtx.createBufferSource();
  src.buffer = noiseBuffer;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(volume * 0.5, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  if (hpFreq) {
    const f = audioCtx.createBiquadFilter();
    f.type = 'highpass'; f.frequency.value = hpFreq;
    src.connect(f); f.connect(gain);
  } else {
    const f = audioCtx.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = 3000;
    src.connect(f); f.connect(gain);
  }
  gain.connect(audioCtx.destination);
  src.start();
}

function playTone(freq, duration, volume, type, startOffset) {
  const t = audioCtx.currentTime + (startOffset || 0);
  const osc = audioCtx.createOscillator();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, t);
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(volume * 0.35, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + duration + 0.05);
}

function sweepTone(fromF, toF, duration, volume, type) {
  const osc = audioCtx.createOscillator();
  osc.type = type || 'sawtooth';
  osc.frequency.setValueAtTime(fromF, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(toF, audioCtx.currentTime + duration);
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(volume * 0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration + 0.05);
}

function playSound(name) {
  if (!audioCtx) initAudio();
  try {
    switch (name) {
      case 'melee_hit':
        noiseBurst(0.06, 0.45);
        playTone(200, 0.08, 0.55, 'square');
        break;
      case 'pistol':
        noiseBurst(0.04, 0.35, 1000);
        playTone(1200, 0.05, 0.4, 'square');
        break;
      case 'rocket':
        noiseBurst(0.35, 0.65, 100);
        playTone(70, 0.3, 0.7, 'sawtooth');
        playTone(50, 0.25, 0.5, 'sine');
        break;
      case 'smg':
        noiseBurst(0.03, 0.25, 2000);
        playTone(1500, 0.03, 0.3, 'square');
        break;
      case 'flamethrower':
        noiseBurst(0.08, 0.2, 600);
        sweepTone(700, 200, 0.08, 0.15, 'sawtooth');
        break;
      case 'laser':
        sweepTone(800, 2200, 0.12, 0.45, 'sine');
        noiseBurst(0.08, 0.2, 3000);
        break;
      case 'mine_place':
        playTone(2000, 0.06, 0.2, 'sine');
        break;
      case 'mine_explode':
        noiseBurst(0.3, 0.55, 50);
        playTone(40, 0.3, 0.75, 'sawtooth');
        break;
      case 'enemy_hit':
        noiseBurst(0.03, 0.2);
        playTone(300, 0.04, 0.3, 'square');
        break;
      case 'enemy_kill':
        playTone(600, 0.06, 0.4, 'square');
        playTone(900, 0.08, 0.3, 'sine');
        break;
      case 'player_hit':
        playTone(100, 0.15, 0.6, 'sawtooth');
        noiseBurst(0.08, 0.4, 80);
        break;
      case 'dodge':
        sweepTone(1200, 2400, 0.08, 0.25, 'sine');
        break;
      case 'explosion':
        noiseBurst(0.3, 0.65, 40);
        playTone(45, 0.3, 0.8, 'sawtooth');
        break;
      case 'pickup':
        playTone(800, 0.08, 0.35, 'sine');
        setTimeout(() => playTone(1200, 0.1, 0.3, 'sine'), 50);
        break;
      case 'level_up':
        playTone(523, 0.12, 0.45, 'sine');
        setTimeout(() => playTone(659, 0.12, 0.45, 'sine'), 100);
        setTimeout(() => playTone(784, 0.15, 0.45, 'sine'), 200);
        break;
      case 'buy':
        playTone(600, 0.06, 0.35, 'sine');
        setTimeout(() => playTone(900, 0.08, 0.35, 'sine'), 70);
        break;
      case 'wave_start':
        playTone(400, 0.1, 0.35, 'square');
        setTimeout(() => playTone(600, 0.15, 0.35, 'square'), 120);
        break;
      case 'boss_spawn':
        playTone(55, 0.6, 0.6, 'sawtooth');
        noiseBurst(0.5, 0.45, 30);
        break;
      case 'boss_kill':
        playTone(35, 0.6, 0.85, 'sawtooth');
        noiseBurst(0.7, 0.75, 15);
        setTimeout(() => { playTone(200, 0.15, 0.5, 'sine'); }, 300);
        setTimeout(() => { playTone(400, 0.25, 0.4, 'sine'); }, 450);
        break;
    }
  } catch (e) { /* audio not available */ }
}

// ======================== GAME FLOW ========================
function gameOver() {
  game.state = 'gameover';
  saveRecord('defeat');
  showOverlay('defeat');
}

function showOverlay(type) {
  document.getElementById('overlay').classList.add('show');
  document.getElementById('restartBtn').style.display = 'block';
  
  if (type === 'victory') {
    document.getElementById('overlayTitle').textContent = '胜利!';
    document.getElementById('overlayTitle').style.color = '#f1c40f';
    document.getElementById('overlaySub').textContent = '你成功存活了20波!';
  } else {
    document.getElementById('overlayTitle').textContent = '游戏结束';
    document.getElementById('overlayTitle').style.color = '#e74c3c';
    document.getElementById('overlaySub').textContent = `存活 ${game.wave} 波，击杀 ${game.enemiesKilled} 敌人`;
  }
  
  document.getElementById('overlayContent').innerHTML = `
    <div style="font-size:11px;color:#aaa;line-height:1.8">
      等级: ${game.level} | 击杀: ${game.enemiesKilled}<br>
      到达波次: ${game.wave}<br>
      武器: ${game.player.weapons.map(w => WEAPON_DEFS[w.id].name).join(', ')}
    </div>
  `;
  document.getElementById('restartBtn').onclick = restartGame;
}

function restartGame() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('pauseOverlay').style.display = 'none';
  initGame();
}

function initGame() {
  const prevDiff = game.difficulty || 'normal';
  game.state = "menu";
  game.wave = 1;
  game.level = 1;
  game.xp = 0;
  game.xpNext = 5;
  game.materials = 0;
  game.enemiesKilled = 0;
  game.totalDamageDealt = 0;
  game.time = 0;
  game.enemies = [];
  game.projectiles = [];
  game.pickups = [];
  game.particles = [];
  game.damageNumbers = [];
  game.shakeTimer = 0;
  game.freezeFrames = 0;
  game.player = createPlayer();
  game.waveEnemiesSpawned = 0;
  game.waveEnemiesTotal = 0;
  game.character = null;
  game.materialBonus = 0;
  game.difficulty = prevDiff;
  game.enemyMult = (DIFFICULTIES[prevDiff] || DIFFICULTIES.normal).enemyMult;
  game.showCombatStats = false;
  showCharacterSelect();
}

function setDifficulty(id) {
  if (DIFFICULTIES[id]) {
    game.difficulty = id;
    game.enemyMult = DIFFICULTIES[id].enemyMult;
    showCharacterSelect();
  }
}

function startGame(charId) {
  document.getElementById("overlay").classList.remove("show");
  game.character = charId;
  game.player = createPlayer(charId);
  game.wave = 1;
  game.materials = 5;
  startWave();
}

  html += '</div>';
  html += '<div style="display:flex;gap:8px;justify-content:center;align-items:center;font-size:11px;margin-top:4px">';

  html += '<span style="color:#f1c40f;min-width:30px;display:inline-block;text-align:center">' + combineLabel + '</span>';

  }

  html += "<div style=\"margin-top:8px\"><button onclick=\"showRecords()\" style=\"padding:4px 16px;font-size:10px;background:#555;color:#fff;border:none;cursor:pointer;font-family:'Courier New',monospace\">📊 历史记录</button></div>";
  document.getElementById("overlayContent").innerHTML = html;
}

// ======================== RECORDS SYSTEM ========================
function saveRecord(result) {
  const records = JSON.parse(localStorage.getItem('brotato_records') || '[]');
  const ch = CHARACTERS.find(c => c.id === game.character);
  records.unshift({
    date: new Date().toLocaleString('zh-CN'),
    result: result,
    wave: game.wave,
    level: game.level,
    enemiesKilled: game.enemiesKilled,
    character: ch ? ch.name : '未知',
    difficulty: DIFFICULTIES[game.difficulty]?.label || '普通',
  });
  if (records.length > 50) records.length = 50;
  localStorage.setItem('brotato_records', JSON.stringify(records));
}

function showRecords() {
  const records = JSON.parse(localStorage.getItem('brotato_records') || '[]');
  document.getElementById("overlayTitle").textContent = "📊 历史记录";
  document.getElementById("overlayTitle").style.color = "#8e44ad";
  document.getElementById("overlaySub").textContent = records.length + " 条记录";
  document.getElementById("restartBtn").style.display = "block";
  document.getElementById("restartBtn").textContent = "返回";
  document.getElementById("restartBtn").onclick = () => { document.getElementById("overlay").classList.remove("show"); showCharacterSelect(); };

  let html = "";
  if (records.length === 0) {
    html = "<div style=\"font-size:11px;color:#666;margin:20px\">暂无记录</div>";
  } else {
    html = `<div style="max-height:300px;overflow-y:auto;margin:8px 0;font-size:9px">
      <table style="width:100%;border-collapse:collapse">
        <tr style="color:#888;border-bottom:1px solid #444">
          <th style="padding:3px 6px;text-align:left">时间</th>
          <th style="padding:3px 6px;text-align:left">角色</th>
          <th style="padding:3px 6px;text-align:left">难度</th>
          <th style="padding:3px 6px;text-align:right">波次</th>
          <th style="padding:3px 6px;text-align:right">等级</th>
          <th style="padding:3px 6px;text-align:right">击杀</th>
          <th style="padding:3px 6px;text-align:center">结果</th>
        </tr>`;
    for (const r of records) {
      const resultColor = r.result === 'victory' ? '#f1c40f' : '#e74c3c';
      const resultText = r.result === 'victory' ? '胜利' : '失败';
      html += `<tr style="border-bottom:1px solid #333">
        <td style="padding:3px 6px;color:#666">${r.date}</td>
        <td style="padding:3px 6px;color:#fff">${r.character}</td>
        <td style="padding:3px 6px;color:#aaa">${r.difficulty}</td>
        <td style="padding:3px 6px;text-align:right;color:#f39c12">${r.wave}</td>
        <td style="padding:3px 6px;text-align:right;color:#2ecc71">${r.level}</td>
        <td style="padding:3px 6px;text-align:right;color:#fff">${r.enemiesKilled}</td>
        <td style="padding:3px 6px;text-align:center;color:${resultColor}">${resultText}</td>
      </tr>`;
    }
    html += "</table></div>";
  }
  document.getElementById("overlayContent").innerHTML = html;
}

// ======================== GAME LOOP ========================
let lastTime = 0;

function gameLoop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  
  if (game.state === 'playing') {
    updateGame(dt);
  } else {
    updateHUD();
  }

  render();
  requestAnimationFrame(gameLoop);
}

// ======================== INPUT ========================
window.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (key === 'w' || key === 'a' || key === 's' || key === 'd') {
    keys[key] = true;
    e.preventDefault();
  }
  if (key === 'r') restartGame();
  if (key === 'escape') {
    if (game.state === 'playing') {
      game.state = 'paused';
      document.getElementById('pauseOverlay').style.display = 'flex';
    } else if (game.state === 'paused') {
      game.state = 'playing';
      document.getElementById('pauseOverlay').style.display = 'none';
    }
  }
  if (key === 'tab') {
    e.preventDefault();
    if (game.state === 'playing' || game.state === 'paused') {
      game.showCombatStats = !game.showCombatStats;
    }
  }
});

window.addEventListener('keyup', (e) => {
  const key = e.key.toLowerCase();
  if (key === 'w' || key === 'a' || key === 's' || key === 'd') {
    keys[key] = false;
    e.preventDefault();
  }
});

// ======================== START ========================
initGame();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
